<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Đức Huy & Minh Trân</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f8e6ea;
  color: #5c3a3a;
  scroll-behavior: smooth;
}

/* SECTION */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

/* HERO */
.hero {
  background: linear-gradient(to bottom, #f8e6ea, #ffffff);
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 64px;
  color: #b76e79;
}

.subtitle {
  letter-spacing: 3px;
  font-size: 14px;
  color: #999;
}

/* IMAGE */
.hero img {
  width: 80%;
  max-width: 500px;
  border-radius: 20px;
  margin-top: 20px;
  filter: brightness(95%);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(183,110,121,0.3);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* TEXT */
h1 {
  font-size: 36px;
  margin: 10px 0;
}

h2 {
  font-size: 18px;
  letter-spacing: 2px;
  color: #b76e79;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
}

.box {
  padding: 15px;
  border: 1px solid #b76e79;
  border-radius: 10px;
  width: 80px;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: 1px solid #b76e79;
  color: #b76e79;
  text-decoration: none;
  border-radius: 30px;
  transition: 0.3s;
}

.btn:hover {
  background: #b76e79;
  color: white;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1.2s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section hero">
  <div>
    <div class="subtitle">WEDDING INVITATION</div>
    <div class="names">Đức Huy & Minh Trân</div>
    <img src="hero.jpg">
  </div>
</div>

<!-- INVITE -->
<div class="section fade">
  <div class="card">
    <h2>TRÂN TRỌNG KÍNH MỜI</h2>
    <h1 id="guestName">Quý Khách</h1>
  </div>
</div>

<!-- INFO -->
<div class="section fade">
  <div class="card">
    <h2>THỜI GIAN & ĐỊA ĐIỂM</h2>
    <p>17:30 — 09.05.2026</p>
    <p>Pavillon Tân Sơn Nhất</p>
  </div>
</div>

<!-- COUNTDOWN -->
<div class="section fade">
  <div class="card">
    <h2>COUNTDOWN</h2>
    <div class="countdown">
      <div class="box"><span id="d"></span><br>Days</div>
      <div class="box"><span id="h"></span><br>Hours</div>
      <div class="box"><span id="m"></span><br>Min</div>
      <div class="box"><span id="s"></span><br>Sec</div>
    </div>
  </div>
</div>

<!-- MAP -->
<div class="section fade">
  <div class="card">
    <h2>LOCATION</h2>
    <a class="btn" href="https://maps.google.com?q=Pavillon Tân Sơn Nhất" target="_blank">
      Xem bản đồ
    </a>
  </div>
</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// NAME
const params = new URLSearchParams(window.location.search);
const ten = params.get("ten");
if (ten) {
  document.getElementById("guestName").innerText = decodeURIComponent(ten);
}

// FADE
const els = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});

// COUNTDOWN
const date = new Date("May 9, 2026 17:30:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = date - now;

  document.getElementById("d").innerText = Math.floor(d/(1000*60*60*24));
  document.getElementById("h").innerText = Math.floor((d/(1000*60*60))%24);
  document.getElementById("m").innerText = Math.floor((d/(1000*60))%60);
  document.getElementById("s").innerText = Math.floor((d/1000)%60);
}, 1000);
</script>

</body>
</html>
