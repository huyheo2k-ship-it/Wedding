<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Đức Huy & Minh Trân</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #f8e6ea;
  overflow-x: hidden;
}

/* ===== COVER 2 CÁNH ===== */
.cover {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  z-index: 999;
}

.door {
  width: 50%;
  height: 100%;
  background: linear-gradient(#f8e6ea, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 1.5s ease;
}

.left {
  border-right: 1px solid #e0bfc4;
}

.right {
  border-left: 1px solid #e0bfc4;
}

.cover.open .left {
  transform: translateX(-100%);
}

.cover.open .right {
  transform: translateX(100%);
}

/* BUTTON */
.open-btn {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 30px;
  border: 1px solid #b76e79;
  border-radius: 30px;
  background: white;
  color: #b76e79;
  cursor: pointer;
}

/* HERO */
.section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 60px;
  color: #b76e79;
}

img {
  width: 80%;
  max-width: 500px;
  border-radius: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.85);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* COUNTDOWN */
.countdown {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.box {
  border: 1px solid #b76e79;
  padding: 10px;
  width: 70px;
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* SPARKLE */
.sparkle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  animation: sparkle 2s infinite;
}

@keyframes sparkle {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="door left">
    <h2>Đức Huy</h2>
  </div>
  <div class="door right">
    <h2>Minh Trân</h2>
  </div>

  <button class="open-btn" onclick="openInvite()">Mở thiệp</button>
</div>

<!-- CONTENT -->
<div>

<div class="section">
  <div>
    <div class="names">Đức Huy & Minh Trân</div>
    <img src="hero.jpg">
  </div>
</div>

<div class="section fade">
  <div class="card">
    <h3>Trân trọng kính mời</h3>
    <h1 id="guestName">Quý khách</h1>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <p>17:30 — 09.05.2026</p>
    <p>Pavillon Tân Sơn Nhất</p>
  </div>
</div>

<div class="section fade">
  <div class="card">
    <div class="countdown">
      <div class="box"><span id="d"></span>Days</div>
      <div class="box"><span id="h"></span>Hours</div>
      <div class="box"><span id="m"></span>Min</div>
      <div class="box"><span id="s"></span>Sec</div>
    </div>
  </div>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// OPEN ANIMATION
function openInvite() {
  document.getElementById("cover").classList.add("open");
  document.getElementById("music").play();
}

// NAME
const params = new URLSearchParams(window.location.search);
const ten = params.get("ten");
if (ten) {
  document.getElementById("guestName").innerText = decodeURIComponent(ten);
}

// FADE
const els = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});

// COUNTDOWN
const date = new Date("May 9, 2026 17:30:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = date - now;

  document.getElementById("d").innerText = Math.floor(d/(1000*60*60*24));
  document.getElementById("h").innerText = Math.floor((d/(1000*60*60))%24);
  document.getElementById("m").innerText = Math.floor((d/(1000*60))%60);
  document.getElementById("s").innerText = Math.floor((d/1000)%60);
}, 1000);

// PARTICLES
for (let i = 0; i < 20; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random()*5) + "s";
  document.body.appendChild(p);
}

// SPARKLE
for (let i = 0; i < 15; i++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  document.body.appendChild(s);
}
</script>

</body>
</html>
